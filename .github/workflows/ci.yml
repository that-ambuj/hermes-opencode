name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest>=8
      - name: Configure git for tests
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "ci"
          git config --global init.defaultBranch main
      - name: Syntax check all modules
        run: |
          python -m py_compile __init__.py config.py transport.py worktree.py \
            projects.py state.py tools.py event_loop.py bootstrap.py \
            reviewer.py pr.py notify.py heartbeat.py dashboard/plugin_api.py
      - name: Run pure-logic tests
        working-directory: tests
        run: python -m pytest . -q
